<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만서각 BOOK ART ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ── 기본 디자인 시스템 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #c9a84c; --cream: #f2ede3; --wood: #1a0f08; --border: rgba(201, 168, 76, 0.3); }

body { 
  background: radial-gradient(circle at center, #2c1b10 0%, #1a0f08 100%); 
  color: var(--cream); 
  font-family: 'Noto Serif KR', serif; 
  min-height: 100vh; 
  word-break: keep-all;
}

.header { 
  position: sticky; top: 0; z-index: 100; 
  background: rgba(26, 15, 8, 0.98); 
  padding: 15px; border-bottom: 2px solid var(--gold); 
  text-align: center; 
}
.brand-title { font-size: 18px; font-weight: 600; color: var(--gold); margin-bottom: 10px; letter-spacing: 0.1em; cursor: pointer; }
.search-wrap { display: flex; border: 1px solid var(--gold); width: 100%; max-width: 400px; margin: 0 auto; background: rgba(0,0,0,0.3); }
#code-input { flex: 1; background: transparent; border: none; color: var(--cream); padding: 12px; font-size: 15px; outline: none; }
.search-btn { background: var(--gold); border: none; padding: 0 20px; color: #1a0f08; font-weight: 600; cursor: pointer; }

#app { padding: 20px; width: 100%; max-width: 900px; margin: 0 auto; }
#error-msg { color: #ff6b6b; font-size: 11px; margin-top: 5px; text-align: center; }

/* ── 리스트 화면 ── */
#list-screen { display: none; margin-top: 20px; }
.list-count { color: var(--gold); margin-bottom: 15px; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

.result-item { 
  display: flex; 
  gap: 15px;
  align-items: center;
  background: rgba(255,255,255,0.03); 
  border: 1px solid var(--border); 
  padding: 12px; 
  margin-bottom: 10px; 
  cursor: pointer; 
  transition: 0.2s; 
}
.result-item:hover { background: rgba(201, 168, 76, 0.1); }

/* 목록용 섬네일 (사진 없으면 자동 숨김) */
.list-thumb {
  width: 70px;
  height: 70px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  display: none; /* 기본적으로 숨김 */
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.list-thumb img { width: 100%; height: 100%; object-fit: contain; }

.item-info { flex: 1; }
.item-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
.item-meta { font-size: 12px; opacity: 0.7; }

/* ── 상세 화면 갤러리 ── */
.gallery-container {
  width: 100%;
  display: none; /* 기본적으로 숨김 */
  overflow-x: auto; 
  scroll-snap-type: x mandatory;
  gap: 10px;
  padding-bottom: 10px;
  margin-bottom: 20px;
}
.gallery-container::-webkit-scrollbar { height: 4px; }
.gallery-container::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

.gallery-item {
  flex: 0 0 100%; 
  scroll-snap-align: start;
  aspect-ratio: 3/4;
  border: 1px solid var(--gold);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}
@media (min-width: 768px) { .gallery-item { flex: 0 0 300px; } }
.gallery-item img { width: 100%; height: 100%; object-fit: contain; }

/* 상세 정보 레이아웃 */
#display-screen { display: none; width: 100%; }
.panel-frame { background: rgba(15, 8, 4, 0.9); border: 1px solid var(--border); padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
.title-row { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.main-title { font-size: 24px; font-weight: 600; color: var(--cream); }

.content-layout { display: flex; flex-direction: column; gap: 30px; }
@media (min-width: 768px) { .content-layout { flex-direction: row; } .left-col { width: 320px; flex-shrink: 0; } .right-col { flex: 1; } }

.meta-item { display: flex; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
.meta-key { width: 95px; flex-shrink: 0; font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
.meta-val { font-size: 15px; color: var(--cream); flex: 1; line-height: 1.4; }

.info-grid { display: grid; grid-template-columns: 1fr; gap: 0 20px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
@media (min-width: 600px) { .info-grid { grid-template-columns: 1fr 1fr; } }

.desc-label { font-size: 11px; color: var(--gold); margin-bottom: 10px; border-left: 2px solid var(--gold); padding-left: 8px; }
.desc-text { font-size: 14.5px; color: #c8bea8; line-height: 1.8; white-space: pre-wrap; text-align: justify; }

.bottom-bar { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; color: var(--gold); }

.active-view { display: block; animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="brand-title" onclick="location.reload()">만서각 BOOK ART ARCHIVE</div>
  <div class="search-wrap">
    <input id="code-input" type="text" placeholder="제목, 작가, 연도, 코드 등 입력">
    <button class="search-btn" onclick="searchArtwork()">SEARCH</button>
  </div>
  <div id="error-msg"></div>
</div>

<div id="app">
  <div id="list-screen">
    <div class="list-count" id="list-count"></div>
    <div id="list-container"></div>
  </div>
  <div id="display-screen">
    <div id="detail-content"></div> 
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyjCRfbUGUamYi-IcQZpW76Lg6YDa7eNBOaYJyywj81g-N8uzrk2Ct8rkUxJ6dogwcL/exec";
let currentResults = [];

function searchArtwork() {
  const keyword = document.getElementById("code-input").value.trim();
  if (!keyword) return;
  document.getElementById("list-screen").style.display = "none";
  document.getElementById("display-screen").style.display = "none";
  document.getElementById("detail-content").innerHTML = ""; 
  document.getElementById("list-container").innerHTML = ""; 
  document.getElementById("error-msg").textContent = "서고 검색 중...";

  fetch(`${GAS_URL}?code=${encodeURIComponent(keyword)}`)
    .then(res => res.json())
    .then(json => {
      document.getElementById("error-msg").textContent = "";
      if (json.found) {
        currentResults = json.data;
        if (currentResults.length === 1) renderPanel(0);
        else renderList(currentResults);
      } else {
        document.getElementById("error-msg").textContent = `"${keyword}" 결과가 없습니다.`;
      }
    });
}

function renderList(data) {
  const ls = document.getElementById("list-screen");
  const container = document.getElementById("list-container");
  document.getElementById("list-count").textContent = `총 ${data.length}건이 발견되었습니다.`;
  
  container.innerHTML = data.map((item, idx) => {
    const photos = item["사진"] ? item["사진"].toString().split(",") : [];
    const firstPhoto = photos.length > 0 ? photos[0].trim() : "";

    // ★ 엑박 방지: 이미지가 성공적으로 로드될 때만 부모(list-thumb)를 보여줌
    const thumbHTML = (firstPhoto && firstPhoto.startsWith("http"))
      ? `<div class="list-thumb" id="thumb-box-${idx}">
           <img src="${firstPhoto}" onload="document.getElementById('thumb-box-${idx}').style.display='flex'">
         </div>`
      : "";

    return `
      <div class="result-item" onclick="renderPanel(${idx})">
        ${thumbHTML}
        <div class="item-info">
          <div class="item-title">${item["표제(국문)"]} ${item["표제(원어)"] ? `<small style="color:var(--gold); font-weight:normal;">(${item["표제(원어)"]})</small>` : ""}</div>
          <div class="item-meta">작가: ${item["작가(국문)"] || "-"} | 연도: ${item["발행연도"] || "-"}</div>
          <div class="item-meta">코드: ${item["작품 코드"]}</div>
        </div>
      </div>
    `;
  }).join("");
  
  ls.style.display = "block";
  ls.classList.add("active-view");
  window.scrollTo(0, 0);
}

function renderPanel(idx) {
  const d = currentResults[idx];
  const ds = document.getElementById("display-screen");
  const content = document.getElementById("detail-content");
  document.getElementById("list-screen").style.display = "none";

  const photos = d["사진"] ? d["사진"].toString().split(",").map(url => url.trim()).filter(url => url.startsWith("http")) : [];
  
  // ★ 엑박 방지: 갤러리도 이미지가 1개라도 로드 성공해야 보여줌
  const photoHTML = photos.length > 0 ? `
    <div class="gallery-container" id="main-gallery">
      ${photos.map((url, pIdx) => `
        <div class="gallery-item">
          <img src="${url}" onload="document.getElementById('main-gallery').style.display='flex'">
        </div>`).join("")}
    </div>
  ` : "";

  content.innerHTML = `
    <div class="panel-frame">
      <div class="title-row"><div class="main-title">${d["표제(국문)"]} ${d["표제(원어)"] ? `(${d["표제(원어)"]})` : ""}</div></div>
      <div class="content-layout">
        <div class="left-col">
          ${photoHTML}
          <div class="meta-item"><div class="meta-key">작품 코드</div><div class="meta-val" style="color:var(--gold); font-weight:600;">${d["작품 코드"]}</div></div>
          <div class="meta-item"><div class="meta-key">위치</div><div class="meta-val">${d["현위치"] || "-"}</div></div>
        </div>
        <div class="right-col">
          <div class="info-grid">
            <div class="meta-item"><div class="meta-key">작가</div><div class="meta-val">${(d["작가(국문)"] || "-") + (d["작가(원어)"] || d["작가 (원어)"] ? ` (${d["작가(원어)"] || d["작가 (원어)"]})` : "")}</div></div>
            <div class="meta-item"><div class="meta-key">발행연도</div><div class="meta-val">${d["발행연도"] || "-"}</div></div>
            <div class="meta-item"><div class="meta-key">소전권서</div><div class="meta-val">${d["소전권서"] || "-"}</div></div>
            <div class="meta-item"><div class="meta-key">출판사</div><div class="meta-val">${d["출판사"] || "-"}</div></div>
            <div class="meta-item"><div class="meta-key">일러스트</div><div class="meta-val">${d["일러스트(국문)"] || "-"}</div></div>
            <div class="meta-item"><div class="meta-key">종/권</div><div class="meta-val">${(d["종"] || "-")}종 / ${(d["권"] || "-")}권</div></div>
            <div class="meta-item" style="grid-column: span 1;"><div class="meta-key">크기</div><div class="meta-val">${d["가로"] ? `${d["가로"]}x${d["세로"]}cm (두께 ${d["두께 D"] || '0'}cm)` : "-"}</div></div>
          </div>
          <div class="desc-label">DESCRIPTION</div>
          <div class="desc-text">${d["도서 설명"] || "내용이 없습니다."}</div>
        </div>
      </div>
      <div class="bottom-bar">
        <div style="font-style: italic; max-width: 70%;">${d["비고"] ? "비고: " + d["비고"] : ""}</div>
        <div>소전문화재단</div>
      </div>
    </div>
  `;

  ds.style.display = "block";
  ds.classList.add("active-view");
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById("code-input").addEventListener("keypress", (e) => { if (e.key === "Enter") searchArtwork(); });
</script>
</body>
</html>
