<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만서각 BOOK ART ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ── 다크 우드톤 서재 디자인 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #c9a84c; --cream: #f2ede3; --wood: #1a0f08; --border: rgba(201, 168, 76, 0.3); }
body { background: radial-gradient(circle at center, #2c1b10 0%, #1a0f08 100%); color: var(--cream); font-family: 'Noto Serif KR', serif; min-height: 100vh; }

.header { position: sticky; top: 0; z-index: 100; background: rgba(26, 15, 8, 0.98); padding: 15px; border-bottom: 2px solid var(--gold); text-align: center; }
.brand-title { font-size: 18px; font-weight: 600; color: var(--gold); margin-bottom: 10px; letter-spacing: 0.1em; cursor: pointer; }
.search-wrap { display: flex; border: 1px solid var(--gold); width: 100%; max-width: 400px; margin: 0 auto; background: rgba(0,0,0,0.3); }
#code-input { flex: 1; background: transparent; border: none; color: var(--cream); padding: 12px; font-size: 15px; text-transform: uppercase; outline: none; }
.search-btn { background: var(--gold); border: none; padding: 0 20px; color: #1a0f08; font-weight: 600; cursor: pointer; }

#app { padding: 20px; width: 100%; max-width: 900px; margin: 0 auto; }
#error-msg { color: #ff6b6b; font-size: 11px; margin-top: 5px; height: 14px; text-align: center; }

/* 리스트 화면 */
#list-screen { display: none; margin-top: 20px; }
.list-count { color: var(--gold); margin-bottom: 15px; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.result-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
.result-item:hover { background: rgba(201, 168, 76, 0.1); }
.item-title { font-size: 18px; font-weight: 600; }

/* 상세 화면 */
#display-screen { display: none; width: 100%; }
.panel-frame { background: rgba(15, 8, 4, 0.9); border: 1px solid var(--border); padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
.title-row { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.ko-title { font-size: 24px; font-weight: 600; }

.content-layout { display: flex; flex-direction: column; gap: 30px; }
@media (min-width: 768px) { .content-layout { flex-direction: row; } .left-col { width: 280px; } .right-col { flex: 1; } }

#d-cover-wrap { width: 100%; max-width: 300px; margin: 0 auto 20px; aspect-ratio: 3/4; border: 1px solid var(--gold); display: none; overflow: hidden; }
.book-cover img { width: 100%; height: 100%; object-fit: cover; }

.meta-item { margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
.meta-key { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
.meta-val { font-size: 14px; margin-top: 2px; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
@media (max-width: 480px) { .info-grid { grid-template-columns: 1fr; } }
.desc-label { font-size: 11px; color: var(--gold); margin-bottom: 10px; border-left: 2px solid var(--gold); padding-left: 8px; }
.desc-text { font-size: 14px; color: #c8bea8; line-height: 1.8; white-space: pre-wrap; text-align: justify; }

.bottom-bar { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 11px; color: var(--gold); }

.visible { display: block !important; animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="brand-title" onclick="location.reload()">만서각 BOOK ART ARCHIVE</div>
  <div class="search-wrap">
    <input id="code-input" type="text" placeholder="제목, 작가, 코드 등 입력">
    <button class="search-btn" onclick="searchArtwork()">SEARCH</button>
  </div>
  <div id="error-msg"></div>
</div>

<div id="app">
  <div id="list-screen">
    <div class="list-count" id="list-count"></div>
    <div id="list-container"></div>
  </div>

  <div id="display-screen">
    <div class="panel-frame">
      <div class="title-row"><div id="d-main-title" class="ko-title"></div></div>
      <div class="content-layout">
        <div class="left-col">
          <div id="d-cover-wrap" class="book-cover"><img id="d-cover" src="" alt="COVER"></div>
          <div class="meta-item"><div class="meta-key">작품 코드</div><div id="d-code" class="meta-val" style="color:var(--gold); font-weight:600;"></div></div>
          <div class="meta-item"><div class="meta-key">위치</div><div id="d-loc" class="meta-val"></div></div>
        </div>
        <div class="right-col">
          <div class="info-grid">
            <div class="meta-item"><div class="meta-key">작가</div><div id="d-author" class="meta-val"></div></div>
            <div class="meta-item"><div class="meta-key">발행연도</div><div id="d-year" class="meta-val"></div></div>
            <div class="meta-item"><div class="meta-key">소전권서</div><div id="d-sojun" class="meta-val"></div></div>
            <div class="meta-item"><div class="meta-key">출판사</div><div id="d-publisher" class="meta-val"></div></div>
            <div class="meta-item" style="grid-column: span 2;"><div class="meta-key">크기</div><div id="d-size" class="meta-val"></div></div>
          </div>
          <div class="desc-label">DESCRIPTION</div>
          <div id="d-desc" class="desc-text"></div>
        </div>
      </div>
      <div class="bottom-bar"><div id="d-bigo" style="font-style: italic; max-width:70%;"></div><div>소전문화재단</div></div>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyjCRfbUGUamYi-IcQZpW76Lg6YDa7eNBOaYJyywj81g-N8uzrk2Ct8rkUxJ6dogwcL/exec";
let currentResults = [];

function searchArtwork() {
  const keyword = document.getElementById("code-input").value.trim();
  if (!keyword) return;
  
  document.getElementById("error-msg").textContent = "서고 검색 중...";
  document.getElementById("display-screen").style.display = "none";
  document.getElementById("list-screen").style.display = "none";

  fetch(`${GAS_URL}?code=${encodeURIComponent(keyword)}`)
    .then(res => res.json())
    .then(json => {
      document.getElementById("error-msg").textContent = "";
      if (json.found) {
        currentResults = json.data;
        if (currentResults.length === 1) renderPanel(0);
        else renderList(currentResults);
      } else {
        document.getElementById("error-msg").textContent = `"${keyword}" 결과가 없습니다.`;
      }
    })
    .catch(err => { document.getElementById("error-msg").textContent = "연결 오류"; });
}

function renderList(data) {
  const container = document.getElementById("list-container");
  document.getElementById("list-count").textContent = `총 ${data.length}건이 발견되었습니다.`;
  container.innerHTML = data.map((item, idx) => `
    <div class="result-item" onclick="renderPanel(${idx})">
      <div class="item-title">${item["표제(국문)"]} ${item["표제(원어)"] ? `<small style="color:var(--gold); font-weight:normal;">(${item["표제(원어)"]})</small>` : ""}</div>
      <div style="font-size:12px; opacity:0.7; margin-top:5px;">작가: ${item["작가(국문)"] || "-"} | 연도: ${item["발행연도"] || "-"} | 코드: ${item["작품 코드"]}</div>
    </div>
  `).join("");
  document.getElementById("list-screen").style.display = "block";
}

function renderPanel(idx) {
  const d = currentResults[idx];
  document.getElementById("list-screen").style.display = "none";
  const ds = document.getElementById("display-screen");
  ds.style.display = "block";
  ds.classList.add("visible");

  // 제목 병기
  document.getElementById("d-main-title").textContent = d["표제(국문)"] + (d["표제(원어)"] ? ` (${d["표제(원어)"]})` : "");
  document.getElementById("d-code").textContent = d["작품 코드"];
  document.getElementById("d-loc").textContent = d["현위치"] || "-";
  document.getElementById("d-author").textContent = (d["작가(국문)"] || "-") + (d["작가(원어)"] || d["작가 (원어)"] ? ` (${d["작가(원어)"] || d["작가 (원어)"]})` : "");
  document.getElementById("d-year").textContent = d["발행연도"] || "-";
  document.getElementById("d-sojun").textContent = d["소전권서"] || "-";
  document.getElementById("d-publisher").textContent = d["출판사"] || "-";
  document.getElementById("d-desc").textContent = d["도서 설명"] || "내용 없음";
  document.getElementById("d-bigo").textContent = d["비고"] ? "비고: " + d["비고"] : "";
  document.getElementById("d-size").textContent = d["가로"] ? `${d["가로"]}x${d["세로"]}cm (두께 ${d["두께 D"] || '0'}cm)` : "-";

  // 사진 엑박 방지: URL이 없으면 숨김
  const coverWrap = document.getElementById("d-cover-wrap");
  if (d["사진"] && d["사진"].toString().startsWith("http")) {
    document.getElementById("d-cover").src = d["사진"];
    coverWrap.style.display = "flex";
  } else {
    coverWrap.style.display = "none";
  }
}

document.getElementById("code-input").addEventListener("keypress", (e) => { if (e.key === "Enter") searchArtwork(); });
</script>
</body>
</html>
