<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만서각 BOOK ART ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ── 디자인 시스템 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #c9a84c; --cream: #f2ede3; --wood: #1a0f08; --border: rgba(201, 168, 76, 0.3); }

body { 
  background: radial-gradient(circle at center, #2c1b10 0%, #1a0f08 100%); 
  color: var(--cream); 
  font-family: 'Noto Serif KR', serif; 
  min-height: 100vh; 
  word-break: keep-all;
}

/* 상단 검색바 */
.header { 
  position: sticky; top: 0; z-index: 100; 
  background: rgba(26, 15, 8, 0.98); 
  padding: 15px; border-bottom: 2px solid var(--gold); 
  text-align: center; 
}
.brand-title { 
  font-size: 18px; font-weight: 600; color: var(--gold); 
  margin-bottom: 10px; letter-spacing: 0.1em; cursor: pointer; 
}
.search-wrap { 
  display: flex; border: 1px solid var(--gold); 
  width: 100%; max-width: 400px; margin: 0 auto; 
  background: rgba(0,0,0,0.3); 
}
#code-input { 
  flex: 1; background: transparent; border: none; 
  color: var(--cream); padding: 12px; font-size: 15px; 
  text-transform: uppercase; outline: none; 
}
.search-btn { 
  background: var(--gold); border: none; padding: 0 20px; 
  color: #1a0f08; font-weight: 600; cursor: pointer; 
}

#app { padding: 20px; width: 100%; max-width: 900px; margin: 0 auto; }
#error-msg { color: #ff6b6b; font-size: 11px; margin-top: 5px; height: 14px; text-align: center; }

/* ── 리스트 화면 ── */
#list-screen { display: none; margin-top: 20px; }
.list-count { color: var(--gold); margin-bottom: 15px; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.result-item { 
  background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
  padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; 
}
.result-item:hover { background: rgba(201, 168, 76, 0.1); }
.item-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
.item-sub { font-size: 13px; color: #aaa; }

/* ── 상세 화면 ── */
#display-screen { display: none; width: 100%; }
.panel-frame { 
  background: rgba(15, 8, 4, 0.9); border: 1px solid var(--border); 
  padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
}
.title-row { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.main-title { font-size: 24px; font-weight: 600; line-height: 1.4; color: var(--cream); }

.content-layout { display: flex; flex-direction: column; gap: 30px; }
@media (min-width: 768px) { .content-layout { flex-direction: row; } .left-col { width: 280px; } .right-col { flex: 1; } }

#d-cover-wrap { width: 100%; max-width: 300px; margin: 0 auto 20px; aspect-ratio: 3/4; border: 1px solid var(--gold); display: none; overflow: hidden; }
.book-cover img { width: 100%; height: 100%; object-fit: cover; }

.meta-item { display: flex; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
.meta-key { width: 95px; flex-shrink: 0; font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
.meta-val { font-size: 15px; color: var(--cream); flex: 1; line-height: 1.4; }

.info-grid { display: grid; grid-template-columns: 1fr; gap: 0 20px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
@media (min-width: 600px) { .info-grid { grid-template-columns: 1fr 1fr; } }

.desc-label { font-size: 11px; color: var(--gold); margin-bottom: 10px; border-left: 2px solid var(--gold); padding-left: 8px; }
.desc-text { font-size: 14.5px; color: #c8bea8; line-height: 1.8; white-space: pre-wrap; text-align: justify; }

.bottom-bar { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; color: var(--gold); }

/* 노출 제어용 클래스 (강력하게 제어) */
.visible { display: block !important; animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="brand-title" onclick="location.reload()">만서각 BOOK ART ARCHIVE</div>
  <div class="search-wrap">
    <input id="code-input" type="text" placeholder="제목, 작가, 연도, 코드 등 입력">
    <button class="search-btn" onclick="searchArtwork()">SEARCH</button>
  </div>
  <div id="error-msg"></div>
</div>

<div id="app">
  <div id="list-screen">
    <div class="list-count" id="list-count"></div>
    <div id="list-container"></div>
  </div>

  <div id="display-screen">
    <div class="panel-frame">
      <div class="title-row"><div id="d-main-title" class="main-title"></div></div>
      <div class="content-layout">
        <div class="left-col">
          <div id="d-cover-wrap" class="book-cover"><img id="d-cover" src="" alt="COVER"></div>
          <div class="meta-item"><div class="meta-key">작품 코드</div><div id="d-code" class="meta-val" style="color:var(--gold); font-weight:600;"></div></div>
          <div class="meta-item"><div class="meta-key">위치</div><div id="d-loc" class="meta-val"></div></div>
        </div>
        <div class="right-col">
          <div class="info-grid">
            <div class="meta-item"><div class="meta-key">작가</div><div id="d-author" class="meta-val"></div></div>
            <div class="meta-item"><div class="meta-key">발행연도</div><div id="d-year" class="meta-val"></div></div>
            <div class="meta-item"><div class="meta-key">소전권서</div><div id="d-sojun" class="meta-val"></div></div>
            <div class="meta-item"><div class="meta-key">출판사</div><div id="d-publisher" class="meta-val"></div></div>
            <div class="meta-item"><div class="meta-key">일러스트</div><div id="d-illus" class="meta-val"></div></div>
            <div class="meta-item"><div class="meta-key">종/권</div><div id="d-set" class="meta-val"></div></div>
            <div class="meta-item" style="grid-column: span 1;"><div class="meta-key">크기</div><div id="d-size" class="meta-val"></div></div>
          </div>
          <div class="desc-label">DESCRIPTION</div>
          <div id="d-desc" class="desc-text"></div>
        </div>
      </div>
      <div class="bottom-bar">
        <div id="d-bigo" style="font-style: italic; max-width: 70%;"></div>
        <div style="font-weight: 600;">소전문화재단</div>
      </div>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyjCRfbUGUamYi-IcQZpW76Lg6YDa7eNBOaYJyywj81g-N8uzrk2Ct8rkUxJ6dogwcL/exec";
let currentResults = [];

function searchArtwork() {
  const keyword = document.getElementById("code-input").value.trim();
  if (!keyword) return;
  
  // ── [슈퍼 청소 로직] ──
  const ds = document.getElementById("display-screen");
  const ls = document.getElementById("list-screen");
  
  // 1. 클래스 제거 및 물리적 숨김
  ds.classList.remove("visible");
  ls.classList.remove("visible");
  ds.style.display = "none";
  ls.style.display = "none";
  
  // 2. 내용물까지 싹 비우기 (잔상 방지용)
  document.getElementById("d-main-title").textContent = "";
  document.getElementById("d-desc").textContent = "";
  document.getElementById("d-cover").src = "";
  document.getElementById("d-cover-wrap").style.display = "none";
  document.getElementById("list-container").innerHTML = "";

  document.getElementById("error-msg").textContent = "서고 검색 중...";

  fetch(`${GAS_URL}?code=${encodeURIComponent(keyword)}`)
    .then(res => res.json())
    .then(json => {
      document.getElementById("error-msg").textContent = "";
      if (json.found) {
        currentResults = json.
